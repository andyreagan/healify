name: Healify
options:
  bundleIdPrefix: com.healify
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5.0"
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    GENERATE_INFOPLIST_FILE: NO
    SWIFT_EMIT_LOC_STRINGS: YES
targets:
  Healify:
    type: application
    platform: iOS
    sources:
      - path: Healify
    settings:
      base:
        INFOPLIST_FILE: Healify/Resources/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.andyreagan.healify
        TARGETED_DEVICE_FAMILY: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: YES
        CODE_SIGN_STYLE: Automatic
        # Free "Personal Team" ID, so xcodegen doesn't reset signing on regen.
        DEVELOPMENT_TEAM: R47VDUQCBQ
  HealifyTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: HealifyTests
    dependencies:
      - target: Healify
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.andyreagan.healify.tests
        DEVELOPMENT_TEAM: R47VDUQCBQ
  HealifyUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: HealifyUITests
    dependencies:
      - target: Healify
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.andyreagan.healify.uitests
        DEVELOPMENT_TEAM: R47VDUQCBQ
schemes:
  Healify:
    build:
      targets:
        Healify: all
        HealifyTests: [test]
        HealifyUITests: [test]
    test:
      targets:
        - HealifyTests
        - HealifyUITests
    run:
      config: Debug
    archive:
      config: Release
