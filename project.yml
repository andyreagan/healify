name: Healify
options:
  bundleIdPrefix: com.healify
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5.0"
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    GENERATE_INFOPLIST_FILE: NO
    SWIFT_EMIT_LOC_STRINGS: YES
targets:
  Healify:
    type: application
    platform: iOS
    sources:
      - path: Healify
    settings:
      base:
        INFOPLIST_FILE: Healify/Resources/Info.plist
        # HealthKit (auto body-type from Apple Health) requires a PAID Apple
        # Developer account to provision. It's OFF by default so the app installs
        # on a free account; the body map still works via Settings > Body type.
        # To enable on a paid account, uncomment the line below and regenerate:
        # CODE_SIGN_ENTITLEMENTS: Healify/Resources/Healify.entitlements
        PRODUCT_BUNDLE_IDENTIFIER: com.andyreagan.healify
        TARGETED_DEVICE_FAMILY: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: YES
        CODE_SIGN_STYLE: Automatic
        # Free "Personal Team" ID, so xcodegen doesn't reset signing on regen.
        DEVELOPMENT_TEAM: R47VDUQCBQ
schemes:
  Healify:
    build:
      targets:
        Healify: all
    run:
      config: Debug
    archive:
      config: Release
