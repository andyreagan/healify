name: CI

on:
  push:
    branches: [ main ]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Build & Test
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        # Pin to Xcode 16 (iOS 18 simulators). The iOS 26 runtime that ships
        # with newer Xcode traps a couple of in-memory SwiftData tests under the
        # test harness; iOS 18 is a valid target for this iOS 17 app.
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16'

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Show available simulators
        run: xcrun simctl list devices available | grep -i iphone || true

      - name: Unit tests
        run: |
          set -o pipefail
          xcodebuild test \
            -project Healify.xcodeproj \
            -scheme Healify \
            -destination "platform=iOS Simulator,name=iPhone 16,OS=latest" \
            -only-testing:HealifyTests \
            -resultBundlePath UnitResults.xcresult \
            CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO

      - name: UI tests
        run: |
          set -o pipefail
          xcodebuild test \
            -project Healify.xcodeproj \
            -scheme Healify \
            -destination "platform=iOS Simulator,name=iPhone 16,OS=latest" \
            -only-testing:HealifyUITests \
            -resultBundlePath UIResults.xcresult \
            CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: TestResults
          path: "*.xcresult"
          if-no-files-found: ignore
